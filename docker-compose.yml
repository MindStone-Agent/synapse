# Synapse — local / dev compose stack.
#
# Two services:
#   - api:    FastAPI + uvicorn (Python container)
#   - web:    Caddy reverse proxy + React static build
#
# Production overlay (docker-compose.prod.yml) flips Caddy to :443 with
# auto-TLS via Let's Encrypt.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: synapse-api:dev
    environment:
      SYNAPSE_DATABASE_URL: sqlite:////data/synapse.db
      SYNAPSE_BIND: 0.0.0.0:8000
      SYNAPSE_LOG_LEVEL: info
      # Comma-separated handles of humans allowed to hit /v1/admin/*.
      # Override per-deploy. Agents go through the admin:* scope on
      # their bearer token instead.
      SYNAPSE_ADMIN_HANDLES: ${SYNAPSE_ADMIN_HANDLES:-clint}
      # Named broadcast aliases — JSON, per-channel. See api/config.py
      # docstring for shape. `@channel` / `@everyone` always fans out to
      # ALL channel members regardless of this config; named aliases
      # (e.g. `@family`) target a curated subset.
      SYNAPSE_NAMED_ALIASES: ${SYNAPSE_NAMED_ALIASES:-}
    volumes:
      - synapse-data:/data
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/healthz').read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: synapse-web:dev
    depends_on:
      api:
        condition: service_started
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  synapse-data:
